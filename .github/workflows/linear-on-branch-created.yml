name: Linear - Branch Created

on: push

jobs:
  move-to-on-develop:
    if: github.event.created == true

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Move issue to On Develop
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          TARGET_STATE_ID: ${{ secrets.LINEAR_STATE_ON_DEVELOP_ID }}
          BRANCH_NAME: ${{ github.event.ref }}
        run: node scripts/linear/moveIssue.js
