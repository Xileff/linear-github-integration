name: Linear - PR Opened

on:
  pull_request:
    types:
      - opened

jobs:
  move-to-code-review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Move issue to Code Review
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          TARGET_STATE_ID: ${{ secrets.LINEAR_STATE_CODE_REVIEW_ID }}
          BRANCH_NAME: ${{ github.head_ref }}
        run: node scripts/linear/moveIssue.js
